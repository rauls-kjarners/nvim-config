name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check StyLua
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  lint:
    name: Lint Lua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "luajit"
      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@v6
      - name: Install Luacheck
        run: luarocks install luacheck
      - name: Run Luacheck
        run: luacheck lua init.lua

  boot:
    name: Boot Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Link Config
        run: |
          mkdir -p ~/.config/nvim
          cp -r ./* ~/.config/nvim/
      - name: Headless Boot
        run: |
          # 1. Let Lazy.nvim download and build plugins
          nvim --headless "+Lazy! sync" +qa

          # 2. Perform a clean boot check for genuine Lua crashes
          nvim --headless "+qa!" 2> nvim_error.log
          if [ -s nvim_error.log ]; then
            cat nvim_error.log
            if grep -qi "error\|stack traceback" nvim_error.log; then
              echo "Error found during boot!"
              exit 1
            fi
          fi
